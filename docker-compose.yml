# ============================================
# BibleSsam - Docker Compose
# ============================================
#
# 사용법:
#   개발 모드:  docker compose up dev
#   프로덕션:   docker compose up web
#   전체:       docker compose up
#   백그라운드:  docker compose up -d
#   중지:       docker compose down
#   로그:       docker compose logs -f web
#
# ============================================

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: biblessam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biblessam}
      POSTGRES_USER: ${POSTGRES_USER:-biblessam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblessam_dev_2026}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblessam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (AI 응답 캐시) ---
  redis:
    image: redis:7-alpine
    container_name: biblessam-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Next.js Web (개발 모드) ---
  dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: biblessam-dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-biblessam}:${POSTGRES_PASSWORD:-biblessam_dev_2026}@db:5432/${POSTGRES_DB:-biblessam}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev

  # --- Next.js Web (프로덕션 빌드) ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: biblessam-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-biblessam}:${POSTGRES_PASSWORD:-biblessam_dev_2026}@db:5432/${POSTGRES_DB:-biblessam}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - prod

volumes:
  pgdata:
  redisdata:
